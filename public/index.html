<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Chat</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    #app { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #0066cc; color: white; padding: 12px 16px; font-weight: bold; }
    #messages { height: 400px; overflow-y: auto; padding: 10px; background: #fafafa; }
    .msg { margin: 6px 0; padding: 8px; background: #e9ecef; border-radius: 6px; }
    .msg .user { font-weight: 600; color: #333; }
    .msg .time { font-size: 0.75rem; color: #666; margin-left: 8px; }
    .msg .text { display: block; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
    #form { display: flex; padding: 10px; border-top: 1px solid #ddd; background: #fff; }
    #username { width: 100px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    #input { flex: 1; padding: 8px; margin-left: 8px; border: 1px solid #ccc; border-radius: 4px; }
    #send { padding: 8px 16px; margin-left: 8px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #send:hover { background: #0052a3; }
  </style>
</head>
<body>
  <div id="app">
    <header>💬 Local Chat Room</header>
    <div id="messages"></div>
    <form id="form">
      <input id="username" type="text" placeholder="Name" maxlength="15" />
      <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const username = document.getElementById('username');

    // Auto-assign random username if empty
    if (!username.value) {
      username.value = 'User' + Math.floor(Math.random() * 9000 + 1000);
    }

    // Load chat history on connect
    socket.on('load_messages', (msgs) => {
      messages.innerHTML = '';
      msgs.forEach(renderMessage);
      messages.scrollTop = messages.scrollHeight;
    });

    // Listen for new messages
    socket.on('new_message', (msg) => {
      renderMessage(msg);
      messages.scrollTop = messages.scrollHeight;
    });

    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `
        <span class="user">${escapeHtml(msg.username)}</span>
        <span class="time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
        <span class="text">${escapeHtml(msg.text)}</span>
      `;
      messages.appendChild(div);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = username.value.trim() || 'Anonymous';
      const text = input.value.trim();
      if (text) {
        socket.emit('chat_message', { username: user, text });
        input.value = '';
        input.focus();
      }
    });
  </script>
</body>
</html>
