<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Chat</title>
  <style>
    :root {
      --bg: #f5f7fa; --card-bg: #ffffff; --text: #1a1a1a; --text-secondary: #666;
      --border: #e2e8f0; --accent: #3b82f6; --accent-hover: #2563eb;
      --msg-bg: #f1f5f9; --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --temp-badge: #f59e0b; --persist-badge: #10b981;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
      --border: #334155; --accent: #60a5fa; --accent-hover: #3b82f6;
      --msg-bg: #334155; --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --temp-badge: #d97706; --persist-badge: #059669;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    
    .screen { width: 100%; max-width: 650px; background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; height: 90vh; max-height: 800px; }
    .hidden { display: none !important; }

    #room-select { padding: 40px 20px; align-items: center; justify-content: center; text-align: center; }
    #room-select h2 { margin-bottom: 8px; color: var(--text); }
    #room-select p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
    #room-form { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    #room-input { width: 120px; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 1.1rem; text-align: center; background: var(--bg); color: var(--text); }
    #room-btn { padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; }
    #room-btn:hover { background: var(--accent-hover); }
    #join-error { color: #ef4444; margin-top: 12px; font-size: 0.9rem; min-height: 20px; }

    header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--accent); color: white; flex-wrap: wrap; gap: 8px; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; background: rgba(0,0,0,0.2); }
    .badge.temp { background: var(--temp-badge); }
    .badge.persist { background: var(--persist-badge); }
    #theme-toggle { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    #theme-toggle:hover { background: rgba(255,255,255,0.3); }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }
    .msg { display: flex; gap: 10px; padding: 10px; background: var(--msg-bg); border-radius: 10px; align-items: flex-start; transition: background 0.2s; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; font-size: 0.85rem; flex-shrink: 0; text-transform: uppercase; }
    .msg-content { flex: 1; min-width: 0; }
    .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .username { font-weight: 600; color: var(--text); }
    .timestamp { font-size: 0.75rem; color: var(--text-secondary); cursor: help; }
    .text { color: var(--text); line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
    #form { display: flex; padding: 12px; border-top: 1px solid var(--border); background: var(--card-bg); gap: 8px; }
    #username { width: 110px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
    #input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
    #send { padding: 10px 18px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
    #send:hover { background: var(--accent-hover); }
    #send:active { transform: scale(0.98); }
    @media (max-width: 600px) {
      .screen { height: 100vh; max-height: none; border-radius: 0; }
      body { padding: 0; }
      #username { width: 90px; }
    }
  </style>
</head>
<body>
  <div id="room-select" class="screen">
    <h2>🔢 Enter Room Number</h2>
    <p>Rooms 1-50: Temporary (cleared on restart)<br>Rooms 51-99: 💾 Saved History</p>
    <form id="room-form">
      <input type="number" id="room-input" min="1" max="99" required placeholder="1-99" />
      <button type="submit" id="room-btn">Join Chat</button>
    </form>
    <div id="join-error"></div>
  </div>

  <div id="app" class="screen hidden">
    <header>
      <h1 id="room-title">💬 Chat Room</h1>
      <span id="room-badge" class="badge"></span>
      <button id="theme-toggle">🌙 Dark</button>
    </header>
    <div id="messages"></div>
    <form id="form">
      <input id="username" type="text" placeholder="Name" maxlength="15" />
      <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const roomSelect = document.getElementById('room-select');
    const app = document.getElementById('app');
    const roomForm = document.getElementById('room-form');
    const roomInput = document.getElementById('room-input');
    const joinError = document.getElementById('join-error');
    const messages = document.getElementById('messages');
    const chatForm = document.getElementById('form');
    const input = document.getElementById('input');
    const usernameInput = document.getElementById('username');
    const themeToggle = document.getElementById('theme-toggle');
    const roomTitle = document.getElementById('room-title');
    const roomBadge = document.getElementById('room-badge');

    let currentRoom = null;

    // Theme handling
    const savedTheme = localStorage.getItem('chat-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeButton(savedTheme);

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('chat-theme', next);
      updateThemeButton(next);
    });

    function updateThemeButton(theme) {
      themeToggle.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    // Room Join Flow
    roomForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const room = roomInput.value.trim();
      joinError.textContent = '';
      
      const num = parseInt(room);
      if (!room || isNaN(num) || num < 1 || num > 99) {
        joinError.textContent = '⚠️ Please enter a number between 1 and 99.';
        return;
      }

      currentRoom = room;
      socket.emit('join_room', currentRoom);
    });

    // Server confirms room join
    socket.on('room_joined', ({ room, messages: msgs, isPersistent }) => {
      currentRoom = room;
      roomTitle.textContent = `💬 Room #${room}`;
      
      roomBadge.textContent = isPersistent ? '💾 Saved' : '🕒 Temporary';
      roomBadge.className = `badge ${isPersistent ? 'persist' : 'temp'}`;
      
      roomSelect.classList.add('hidden');
      app.classList.remove('hidden');
      
      messages.innerHTML = '';
      msgs.forEach(renderMessage);
      scrollToBottom();
      
      if (!usernameInput.value) {
        usernameInput.value = 'User' + Math.floor(Math.random() * 9000 + 1000);
      }
    });

    socket.on('join_error', (msg) => {
      joinError.textContent = `❌ ${msg}`;
    });

    socket.on('new_message', (msg) => {
      renderMessage(msg);
      scrollToBottom();
    });

    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = 'msg';
      const initials = msg.username.slice(0, 2).toUpperCase();
      const color = stringToColor(msg.username);
      const relativeTime = getRelativeTime(msg.timestamp);
      const fullTime = new Date(msg.timestamp).toLocaleString();

      div.innerHTML = `
        <div class="avatar" style="background:${color}">${initials}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="username">${escapeHtml(msg.username)}</span>
            <span class="timestamp" title="${fullTime}">${relativeTime}</span>
          </div>
          <span class="text">${escapeHtml(msg.text)}</span>
        </div>
      `;
      messages.appendChild(div);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return `hsl(${Math.abs(hash) % 360}, 65%, 55%)`;
    }

    function getRelativeTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diffSec = Math.floor((now - date) / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHr = Math.floor(diffMin / 60);
      if (diffSec < 10) return 'just now';
      if (diffSec < 60) return `${diffSec}s`;
      if (diffMin < 60) return `${diffMin}m`;
      if (diffHr < 24) return `${diffHr}h`;
      return date.toLocaleDateString();
    }

    setInterval(() => {
      document.querySelectorAll('.timestamp').forEach(el => {
        if (el.title) el.textContent = getRelativeTime(el.title);
      });
    }, 30000);

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!currentRoom) return;
      const user = usernameInput.value.trim() || 'Anonymous';
      const text = input.value.trim();
      if (text) {
        socket.emit('chat_message', { room: currentRoom, username: user, text });
        input.value = '';
        input.focus();
      }
    });
  </script>
</body>
</html>
